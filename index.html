<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>INTUITY — Writing Models</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A961;
  --gold-dim: rgba(201,169,97,0.15);
  --gold-mid: rgba(201,169,97,0.4);
  --ink: #0c0c0c;
  --parchment: #f2ece0;
  --parchment-dark: #e8e0d0;
  --chalk: #e5e5e7;
  --mist: rgba(229,229,231,0.5);
  --border: rgba(201,169,97,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height:100%;
  overflow:hidden;
  background: var(--ink);
  font-family: 'DM Sans', sans-serif;
  color: var(--chalk);
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════
   SCREENS — full viewport stacking
═══════════════════════════════════ */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════════════
   COLD OPEN — phrase poster
═══════════════════════════════════ */
#screen-cold {
  background: var(--ink);
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

.cold-bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,169,97,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,97,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.cold-phrase-wrap {
  position: relative;
  z-index: 2;
  padding: 2rem;
  text-align: center;
  max-width: 600px;
  width: 100%;
}

.cold-label {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0.6;
  margin-bottom: 2.5rem;
  animation: fadeUp 0.8s 0.3s both;
}

.cold-phrase {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 12vw, 8rem);
  line-height: 0.9;
  color: var(--chalk);
  letter-spacing: 0.01em;
  animation: fadeUp 0.8s 0.5s both;
}

.cold-phrase .gold-word { color: var(--gold); }
.cold-phrase .outline-word {
  -webkit-text-stroke: 2px var(--chalk);
  color: transparent;
}

.cold-subphrase {
  font-family: 'Crimson Text', Georgia, serif;
  font-style: italic;
  font-size: clamp(1rem, 3vw, 1.3rem);
  color: rgba(229,229,231,0.55);
  margin-top: 2rem;
  line-height: 1.6;
  animation: fadeUp 0.8s 0.7s both;
}

.cold-enter {
  margin-top: 3rem;
  animation: fadeUp 0.8s 1s both;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}

.cold-enter-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.15em;
  color: var(--ink);
  background: var(--gold);
  border: none;
  padding: 0.85rem 2.5rem;
  border-radius: 2rem;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.cold-enter-btn:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 8px 25px rgba(201,169,97,0.4);
}

.cold-hint {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.3);
}

.cold-brand {
  position: absolute;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.2em;
  color: rgba(201,169,97,0.15);
  z-index: 2;
}

/* ═══════════════════════════════════
   MAIN APP
═══════════════════════════════════ */
#screen-app {
  background: var(--ink);
  overflow: hidden;
}

/* HEADER */
.app-header {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1rem;
  border-bottom: 1px solid var(--border);
  background: rgba(12,12,12,0.95);
  backdrop-filter: blur(20px);
}

.brand-mark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, var(--gold), rgba(255,255,255,0.8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-sub {
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.45);
  margin-top: 0.1rem;
}

.header-actions {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.hdr-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  color: var(--gold);
  font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.hdr-btn:hover { background: var(--gold-mid); transform: scale(1.1); }
.hdr-btn.active { background: var(--gold); color: var(--ink); }

/* TYPE NAV */
.type-nav {
  flex-shrink: 0;
  display: flex;
  padding: 0.5rem;
  gap: 0.35rem;
  background: rgba(12,12,12,0.8);
  border-bottom: 1px solid var(--border);
}

.type-btn {
  flex: 1;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: rgba(201,169,97,0.4);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 0.5rem;
  padding: 0.45rem 0.25rem;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
}
.type-btn:hover { color: var(--gold); border-color: var(--border); }
.type-btn.active {
  color: var(--ink);
  background: var(--gold);
  border-color: var(--gold);
}

/* VIEW TOGGLE */
.view-toggle {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  gap: 0.25rem;
  padding: 0.5rem;
  background: rgba(12,12,12,0.6);
  border-bottom: 1px solid var(--border);
}

.view-btn {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.4);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 2rem;
  padding: 0.35rem 1rem;
  cursor: pointer;
  transition: all 0.25s;
}
.view-btn:hover { color: var(--gold); }
.view-btn.active {
  color: var(--ink);
  background: var(--gold);
  border-color: var(--gold);
}

/* CONTENT AREA */
.content-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* ═══════════════════════════════════
   POSTER VIEW
═══════════════════════════════════ */
#view-poster {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
}
#view-poster.show { display: flex; }

.poster-section-nav {
  flex-shrink: 0;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0.5rem;
  gap: 0.35rem;
  border-bottom: 1px solid var(--border);
}
.poster-section-nav::-webkit-scrollbar { display: none; }

.section-chip {
  flex-shrink: 0;
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.45);
  background: transparent;
  border: 1px solid rgba(201,169,97,0.15);
  border-radius: 2rem;
  padding: 0.3rem 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.section-chip:hover { color: var(--gold); border-color: var(--gold-mid); }
.section-chip.active {
  color: var(--ink);
  background: var(--gold);
  border-color: var(--gold);
}

.poster-stage {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.poster-card {
  position: absolute;
  inset: 0;
  opacity: 0;
  transform: translateX(60px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}
.poster-card.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}
.poster-card.exit {
  opacity: 0;
  transform: translateX(-60px);
}

/* POSTER STYLE 1: BAUHAUS SLASH (conclusions, recommendations) */
.poster-bauhaus {
  background: #f0ebe0;
  overflow: hidden;
}
.bauhaus-slash {
  position: absolute;
  inset: 0;
  background: linear-gradient(140deg, var(--gold) 0%, var(--gold) 38%, transparent 38%);
}
.bauhaus-slash-2 {
  position: absolute;
  inset: 0;
  background: linear-gradient(140deg, transparent 36%, var(--ink) 36%);
}
.bauhaus-content {
  position: relative;
  z-index: 2;
  padding: 1.5rem 1.25rem;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.bauhaus-tag {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink);
  background: #f0ebe0;
  display: inline-block;
  padding: 0.25rem 0.65rem;
  border-radius: 2rem;
  align-self: flex-start;
}
.bauhaus-phrase {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 9vw, 5.5rem);
  line-height: 0.9;
  color: #f0ebe0;
  letter-spacing: 0.01em;
  flex: 1;
  display: flex;
  align-items: center;
}
.bauhaus-phrase .g { color: var(--gold); }
.bauhaus-phrase .o { -webkit-text-stroke: 2px #f0ebe0; color: transparent; }
.bauhaus-example {
  font-family: 'Crimson Text', serif;
  font-style: italic;
  font-size: clamp(0.8rem, 2.2vw, 1rem);
  color: rgba(240,235,224,0.65);
  line-height: 1.55;
  max-width: 90%;
  margin-top: 0.75rem;
}
.bauhaus-example .fill { color: var(--gold); font-style: normal; font-weight: 600; }

/* POSTER STYLE 2: GRID DARK (thesis, body) */
.poster-grid {
  background: var(--ink);
  overflow: hidden;
}
.grid-texture {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,169,97,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,169,97,0.04) 1px, transparent 1px);
  background-size: 28px 28px;
}
.grid-content {
  position: relative;
  z-index: 2;
  padding: 1.5rem 1.25rem;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.grid-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.grid-pill {
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--gold);
  padding: 0.25rem 0.65rem;
  border-radius: 2rem;
}
.grid-counter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  color: rgba(201,169,97,0.25);
  letter-spacing: 0.1em;
}
.grid-phrase {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 10vw, 6rem);
  line-height: 0.88;
  color: var(--chalk);
  letter-spacing: 0.02em;
  flex: 1;
  display: flex;
  align-items: center;
}
.grid-phrase .a { color: var(--gold); }
.grid-divider { width: 32px; height: 2px; background: var(--gold); margin: 0.75rem 0; }
.grid-example {
  font-size: clamp(0.7rem, 2vw, 0.85rem);
  color: rgba(229,229,231,0.55);
  line-height: 1.6;
  font-weight: 300;
}
.grid-example .fill { color: var(--gold); font-weight: 600; }
.grid-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(201,169,97,0.12);
  padding-top: 0.75rem;
  margin-top: 0.5rem;
}
.grid-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  color: rgba(201,169,97,0.18);
  letter-spacing: 0.12em;
}
.save-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(201,169,97,0.3);
  background: transparent;
  color: var(--gold);
  font-size: 0.85rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.save-btn.saved {
  background: var(--gold);
  color: var(--ink);
  transform: scale(1.2);
  border-color: var(--gold);
}

/* POSTER STYLE 3: GOLD BLEED (intro, openings) */
.poster-gold {
  background: var(--gold);
  overflow: hidden;
}
.gold-num-bg {
  position: absolute;
  bottom: -1.5rem;
  right: -0.5rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16rem;
  line-height: 1;
  color: rgba(0,0,0,0.07);
  pointer-events: none;
  z-index: 0;
}
.gold-content {
  position: relative;
  z-index: 2;
  padding: 1.5rem 1.25rem;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.gold-tag {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
}
.gold-phrase {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3rem, 9.5vw, 5.5rem);
  line-height: 0.9;
  color: var(--ink);
  letter-spacing: 0.01em;
  flex: 1;
  display: flex;
  align-items: center;
}
.gold-phrase .w { color: #f0ebe0; }
.gold-context-box {
  background: var(--ink);
  border-radius: 0.75rem;
  padding: 0.9rem 1rem;
  margin-top: 0.75rem;
}
.gold-context-label {
  font-size: 0.5rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.4);
  margin-bottom: 0.4rem;
}
.gold-context-text {
  font-size: clamp(0.7rem, 2vw, 0.82rem);
  color: rgba(229,229,231,0.75);
  line-height: 1.6;
  font-weight: 300;
}
.gold-context-text .hl { color: var(--gold); font-weight: 600; }
.gold-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1rem;
}
.gold-dots { display: flex; gap: 4px; }
.gold-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(0,0,0,0.2);
  transition: all 0.3s;
  cursor: pointer;
}
.gold-dot.active {
  background: var(--ink);
  width: 14px;
  border-radius: 3px;
}

/* PHRASE NAV */
.phrase-nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.6rem 1rem;
  background: rgba(12,12,12,0.9);
  border-top: 1px solid var(--border);
}
.pnav-arrow {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 1px solid var(--border);
  color: var(--gold);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.pnav-arrow:hover:not(:disabled) { background: var(--gold-mid); transform: scale(1.1); }
.pnav-arrow:disabled { opacity: 0.2; cursor: not-allowed; }
.pnav-count {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  color: rgba(201,169,97,0.35);
  letter-spacing: 0.1em;
  min-width: 52px;
  text-align: center;
}
.pnav-group-dots {
  display: flex;
  gap: 3px;
  flex: 1;
  justify-content: center;
}
.pnav-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(201,169,97,0.15);
  cursor: pointer;
  transition: all 0.25s;
}
.pnav-dot.active {
  background: var(--gold);
  width: 14px;
  border-radius: 3px;
}

/* SAVED TRAY */
.saved-tray {
  flex-shrink: 0;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.4s ease;
  background: rgba(201,169,97,0.06);
  border-top: 1px solid var(--border);
}
.saved-tray.open { max-height: 120px; }
.saved-inner {
  padding: 0.65rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}
.saved-header {
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.45);
}
.saved-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  max-height: 60px;
  overflow-y: auto;
  scrollbar-width: none;
}
.saved-list::-webkit-scrollbar { display: none; }
.saved-tag {
  font-size: 0.6rem;
  color: var(--gold);
  background: rgba(201,169,97,0.1);
  border: 1px solid rgba(201,169,97,0.25);
  border-radius: 2rem;
  padding: 0.2rem 0.55rem;
  white-space: nowrap;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════
   ESSAY (COMPLETE TEXT) VIEW
═══════════════════════════════════ */
#view-essay {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#view-essay.show { display: flex; }

.essay-scroll {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(201,169,97,0.2) transparent;
}
.essay-scroll::-webkit-scrollbar { width: 3px; }
.essay-scroll::-webkit-scrollbar-thumb { background: rgba(201,169,97,0.3); border-radius: 2px; }

.essay-paper {
  background: linear-gradient(135deg, #f5f1e8, #ede8dc);
  margin: 0.75rem;
  border-radius: 1rem;
  padding: 2rem 1.5rem;
  min-height: calc(100% - 1.5rem);
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
}

.essay-title-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8a7a62;
  text-align: center;
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid rgba(139,115,85,0.2);
}

.essay-para { margin-bottom: 1.5rem; }
.essay-para:last-of-type { margin-bottom: 2rem; }

.essay-para-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #6b5843;
  margin-bottom: 0.5rem;
  padding-bottom: 0.35rem;
  border-bottom: 2px solid rgba(201,169,97,0.25);
}

.essay-para-text {
  font-family: 'Crimson Text', serif;
  font-size: 1.1rem;
  line-height: 1.8;
  color: #2a2a2a;
  text-align: justify;
  text-indent: 1.75rem;
}

.essay-para-text .dm { color: #3a5bbf; font-weight: 600; }

.essay-nav {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1rem;
  background: rgba(12,12,12,0.9);
  border-top: 1px solid var(--border);
}
.essay-nav-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  color: var(--ink);
  background: linear-gradient(135deg, #9a9186, var(--gold));
  border: none;
  border-radius: 2rem;
  padding: 0.55rem 1.25rem;
  cursor: pointer;
  transition: all 0.25s;
}
.essay-nav-btn:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--gold), #FFD700);
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(201,169,97,0.35);
}
.essay-nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.essay-counter {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  color: rgba(201,169,97,0.4);
  letter-spacing: 0.1em;
  min-width: 60px;
  text-align: center;
}

/* ═══════════════════════════════════
   LOADING STATE
═══════════════════════════════════ */
.loading-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  z-index: 10;
  background: var(--ink);
  transition: opacity 0.3s;
}
.loading-state.hidden { opacity: 0; pointer-events: none; }
.loading-ring {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid rgba(201,169,97,0.1);
  border-top-color: var(--gold);
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(201,169,97,0.4);
}

/* ═══════════════════════════════════
   ANIMATIONS
═══════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ═══════════════════════════════════
   MOBILE REFINEMENTS
═══════════════════════════════════ */
@media (max-width: 400px) {
  .cold-phrase { font-size: 3rem; }
  .bauhaus-phrase { font-size: 2.5rem; }
  .grid-phrase { font-size: 2.8rem; }
  .gold-phrase { font-size: 2.6rem; }
}

@media (min-width: 600px) {
  .essay-paper { margin: 1rem 2rem; padding: 2.5rem 2.5rem; }
  .essay-para-text { font-size: 1.15rem; }
}
</style>
</head>
<body>

<!-- ═══ COLD OPEN ═══ -->
<div id="screen-cold" class="screen active">
  <div class="cold-bg-grid"></div>
  <div class="cold-phrase-wrap">
    <div class="cold-label">INTUITY · Writing Phrases · B2/C1</div>
    <div class="cold-phrase" id="coldPhrase">
      NOWADAYS,<br>
      <span class="gold-word">THERE IS</span><br>
      <span class="outline-word">CONSIDERABLE</span><br>
      DEBATE
    </div>
    <div class="cold-subphrase" id="coldSub">
      — the essay hook that opens everything.
    </div>
    <div class="cold-enter">
      <button class="cold-enter-btn" onclick="enterApp()">ENTER INTUITY</button>
      <div class="cold-hint">tap to explore all writing types</div>
    </div>
  </div>
  <div class="cold-brand">INTUITY</div>
</div>

<!-- ═══ MAIN APP ═══ -->
<div id="screen-app" class="screen">

  <!-- HEADER -->
  <header class="app-header">
    <div>
      <div class="brand-mark">INTUITY</div>
      <div class="brand-sub" id="appSubtitle">Writing Models</div>
    </div>
    <div class="header-actions">
      <div class="hdr-btn" id="saveToggleBtn" onclick="toggleSavedTray()" title="Saved phrases">♡</div>
      <div class="hdr-btn" onclick="goBack()" title="Back to start">↩</div>
    </div>
  </header>

  <!-- TYPE NAV -->
  <nav class="type-nav">
    <button class="type-btn active" data-type="essays" onclick="loadType('essays',this)">Essays</button>
    <button class="type-btn" data-type="reports" onclick="loadType('reports',this)">Reports</button>
    <button class="type-btn" data-type="reviews" onclick="loadType('reviews',this)">Reviews</button>
    <button class="type-btn" data-type="emails" onclick="loadType('emails',this)">Emails</button>
  </nav>

  <!-- VIEW TOGGLE -->
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('poster',this)">Phrase Cards</button>
    <button class="view-btn" onclick="setView('essay',this)">Complete Text</button>
  </div>

  <!-- CONTENT -->
  <div class="content-area">

    <div class="loading-state" id="loadingState">
      <div class="loading-ring"></div>
      <div class="loading-text">Loading content</div>
    </div>

    <!-- POSTER VIEW -->
    <div id="view-poster" class="show">
      <div class="poster-section-nav" id="sectionNav"></div>
      <div class="poster-stage" id="posterStage">
        <!-- cards injected here -->
      </div>
      <div class="phrase-nav">
        <button class="pnav-arrow" id="prevPhrase" onclick="navigatePhrase(-1)">←</button>
        <div class="pnav-group-dots" id="phraseDots"></div>
        <div class="pnav-count" id="phraseCount">1/1</div>
        <button class="pnav-arrow" id="nextPhrase" onclick="navigatePhrase(1)">→</button>
      </div>
    </div>

    <!-- ESSAY VIEW -->
    <div id="view-essay">
      <div class="essay-scroll" id="essayScroll">
        <div class="essay-paper" id="essayPaper"></div>
      </div>
      <nav class="essay-nav">
        <button class="essay-nav-btn" id="prevEssay" onclick="navigateEssay(-1)">← Prev</button>
        <div class="essay-counter" id="essayCounter">1 / 1</div>
        <button class="essay-nav-btn" id="nextEssay" onclick="navigateEssay(1)">Next →</button>
      </nav>
    </div>

  </div>

  <!-- SAVED TRAY -->
  <div class="saved-tray" id="savedTray">
    <div class="saved-inner">
      <div class="saved-header">Phrases saved this session · <span id="savedCount">0</span></div>
      <div class="saved-list" id="savedList"></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  DATA PATHS
// ═══════════════════════════════════════════
const DATA = {
  essays:  { models: 'data/essays-models.json',  hook: 'data/essay-hook.json',        thesis: 'data/essay-thesis.json',       full: 'data/essay-full-structures.json' },
  reports: { models: 'data/reports-models.json', hook: 'data/report-intro-purpose.json', thesis: 'data/report-intro-basis.json', full: 'data/report-full-structures.json' },
  reviews: { models: 'data/reviews-models.json', hook: 'data/review-intro-opening.json', thesis: 'data/review-intro-background.json', full: 'data/review-full-structures.json' },
  emails:  { models: 'data/emails-models.json',  hook: 'data/email-opening.json',     thesis: 'data/email-body.json',         full: 'data/email-closing.json' }
};

const TYPE_MAP = {
  essays: 'for_and_against',
  reports: 'formal_report',
  reviews: 'product_review',
  emails: 'informal_email'
};

// POSTER STYLE assignment by section keyword
function posterStyle(label) {
  if (!label) return 'grid';
  const l = label.toLowerCase();
  if (l.includes('introduc') || l.includes('opening') || l.includes('hook') || l.includes('reputation') || l.includes('background')) return 'gold';
  if (l.includes('conclusion') || l.includes('recommend') || l.includes('closing')) return 'bauhaus';
  return 'grid';
}

// Word-split for poster rendering
function splitPhraseForPoster(phrase, style) {
  const clean = phrase.replace(/\[([^\]]+)\]/g, '$1');
  const words = clean.split(/\s+/).filter(Boolean);
  if (words.length <= 4) {
    return words.map((w,i) => {
      if (style === 'bauhaus') return i % 3 === 2 ? `<span class="o">${w}</span>` : (i % 3 === 1 ? `<span class="g">${w}</span>` : w);
      if (style === 'grid')    return i % 3 === 1 ? `<span class="a">${w}</span>` : w;
      if (style === 'gold')    return i % 2 === 1 ? `<span class="w">${w}</span>` : w;
      return w;
    }).join('<br>');
  }
  // longer: take first 5 words
  const display = words.slice(0, 5);
  return display.map((w,i) => {
    if (style === 'bauhaus') return i % 3 === 2 ? `<span class="o">${w}</span>` : (i === 1 ? `<span class="g">${w}</span>` : w);
    if (style === 'grid')    return i % 3 === 1 ? `<span class="a">${w}</span>` : w;
    if (style === 'gold')    return i === 1 ? `<span class="w">${w}</span>` : w;
    return w;
  }).join('<br>');
}

function formatExample(phrase) {
  return phrase.replace(/\[([^\]]+)\]/g, '<span class="fill">$1</span>');
}
function formatExampleGold(phrase) {
  return phrase.replace(/\[([^\]]+)\]/g, '<span class="hl">$1</span>');
}

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentType = 'essays';
let currentView = 'poster';
let modelsData = null;
let phraseData = { hook: null, thesis: null, full: null };
let sections = []; // [{label, phrases:[]}]
let currentSection = 0;
let currentPhrase = 0;
let essayIndex = 0;
let savedPhrases = [];
let savedTrayOpen = false;

// ═══════════════════════════════════════════
//  ENTRY
// ═══════════════════════════════════════════
function enterApp() {
  document.getElementById('screen-cold').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  loadType('essays', document.querySelector('.type-btn[data-type="essays"]'));
}
function goBack() {
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-cold').classList.add('active');
}

// ═══════════════════════════════════════════
//  LOAD TYPE
// ═══════════════════════════════════════════
async function loadType(type, btn) {
  if (btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  currentType = type;
  currentSection = 0;
  currentPhrase = 0;
  essayIndex = 0;
  document.getElementById('appSubtitle').textContent = type.charAt(0).toUpperCase() + type.slice(1);

  showLoading(true);

  try {
    const paths = DATA[type];
    const [mod, hook, thesis, full] = await Promise.all([
      fetchJSON(paths.models),
      fetchJSON(paths.hook),
      fetchJSON(paths.thesis),
      fetchJSON(paths.full)
    ]);
    modelsData = mod;
    phraseData = { hook, thesis, full };

    buildSections();
    if (currentView === 'poster') renderPosterView();
    if (currentView === 'essay')  renderEssayView();

  } catch(e) {
    console.error(e);
  }

  showLoading(false);
}

async function fetchJSON(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error('Failed: ' + path);
  return r.json();
}

// ═══════════════════════════════════════════
//  BUILD SECTIONS from phrase JSON
// ═══════════════════════════════════════════
function buildSections() {
  sections = [];
  const typeKey = TYPE_MAP[currentType];

  // Helper: extract all phrase groups from a section object
  function extractSection(label, sectionObj) {
    if (!sectionObj || !sectionObj.phrases) return;
    const allPhrases = [];
    Object.values(sectionObj.phrases).forEach(group => {
      if (Array.isArray(group)) allPhrases.push(...group);
    });
    if (allPhrases.length) sections.push({ label, phrases: allPhrases });
  }

  if (currentType === 'essays') {
    const hookStr = phraseData.hook?.structures?.[typeKey];
    const thesisStr = phraseData.thesis?.structures?.[typeKey];
    const fullStr = phraseData.full?.structures?.[typeKey];
    if (hookStr) Object.entries(hookStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (thesisStr) Object.entries(thesisStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (fullStr) Object.entries(fullStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
  }
  else if (currentType === 'reports') {
    const hookStr = phraseData.hook?.structures?.[typeKey];
    const thesisStr = phraseData.thesis?.structures?.[typeKey];
    const fullStr = phraseData.full?.structures?.[typeKey];
    if (hookStr) Object.entries(hookStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (thesisStr) Object.entries(thesisStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (fullStr) Object.entries(fullStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
  }
  else if (currentType === 'reviews') {
    const hookStr = phraseData.hook?.structures?.[typeKey];
    const thesisStr = phraseData.thesis?.structures?.[typeKey];
    const fullStr = phraseData.full?.structures?.[typeKey];
    if (hookStr) Object.entries(hookStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (thesisStr) Object.entries(thesisStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    if (fullStr) Object.entries(fullStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
  }
  else if (currentType === 'emails') {
    // Try both informal and formal
    ['informal_email','formal_email'].forEach(emailType => {
      const hookStr = phraseData.hook?.structures?.[emailType];
      const thesisStr = phraseData.thesis?.structures?.[emailType];
      const fullStr = phraseData.full?.structures?.[emailType];
      if (hookStr) Object.entries(hookStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
      if (thesisStr) Object.entries(thesisStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
      if (fullStr) Object.entries(fullStr.sections || {}).forEach(([k,v]) => extractSection(v.label || k, v));
    });
  }
}

// ═══════════════════════════════════════════
//  POSTER VIEW
// ═══════════════════════════════════════════
function renderPosterView() {
  if (!sections.length) return;

  // Section chips
  const nav = document.getElementById('sectionNav');
  nav.innerHTML = sections.map((s, i) =>
    `<button class="section-chip ${i===currentSection?'active':''}" onclick="selectSection(${i})">${s.label}</button>`
  ).join('');

  renderPosterCard();
}

function selectSection(i) {
  currentSection = i;
  currentPhrase = 0;
  document.querySelectorAll('.section-chip').forEach((c,idx) => {
    c.classList.toggle('active', idx === i);
  });
  renderPosterCard();
}

function renderPosterCard() {
  const sec = sections[currentSection];
  if (!sec) return;

  const phrases = sec.phrases;
  const phrase = phrases[currentPhrase] || phrases[0];
  const style = posterStyle(sec.label);
  const total = phrases.length;

  // Dots
  const dotsEl = document.getElementById('phraseDots');
  const maxDots = Math.min(total, 12);
  dotsEl.innerHTML = Array.from({length: maxDots}, (_,i) =>
    `<div class="pnav-dot ${i===currentPhrase%maxDots?'active':''}" onclick="goToPhrase(${i})"></div>`
  ).join('');

  document.getElementById('phraseCount').textContent = `${currentPhrase+1}/${total}`;
  document.getElementById('prevPhrase').disabled = currentPhrase === 0;
  document.getElementById('nextPhrase').disabled = currentPhrase === total - 1;

  const stage = document.getElementById('posterStage');

  // Remove old active / add exit
  const old = stage.querySelector('.poster-card.active');
  if (old) {
    old.classList.remove('active');
    old.classList.add('exit');
    setTimeout(() => old.remove(), 400);
  }

  const card = buildPosterCard(phrase, sec.label, style, currentPhrase + 1, total);
  stage.appendChild(card);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => card.classList.add('active'));
  });
}

function buildPosterCard(phrase, label, style, num, total) {
  const card = document.createElement('div');
  card.className = 'poster-card';

  const posterPhrase = splitPhraseForPoster(phrase, style);
  const isSaved = savedPhrases.includes(phrase);

  if (style === 'bauhaus') {
    card.innerHTML = `
      <div class="poster-bauhaus" style="flex:1;position:relative;">
        <div class="bauhaus-slash"></div>
        <div class="bauhaus-slash-2"></div>
        <div class="bauhaus-content">
          <div class="bauhaus-tag">${label}</div>
          <div class="bauhaus-phrase">${posterPhrase}</div>
          <div class="bauhaus-example">${formatExample(phrase)}</div>
        </div>
      </div>
    `;
  } else if (style === 'gold') {
    card.innerHTML = `
      <div class="poster-gold" style="flex:1;position:relative;">
        <div class="gold-num-bg">${num}</div>
        <div class="gold-content">
          <div class="gold-tag">${label}</div>
          <div class="gold-phrase">${posterPhrase}</div>
          <div class="gold-context-box">
            <div class="gold-context-label">In context</div>
            <div class="gold-context-text">${formatExampleGold(phrase)}</div>
          </div>
          <div class="gold-footer">
            <div class="gold-dots" id="goldDots"></div>
            <button class="save-btn ${isSaved?'saved':''}" onclick="toggleSave('${phrase.replace(/'/g,"\\'")}',this)">
              ${isSaved?'♥':'♡'}
            </button>
          </div>
        </div>
      </div>
    `;
  } else {
    card.innerHTML = `
      <div class="poster-grid" style="flex:1;position:relative;">
        <div class="grid-texture"></div>
        <div class="grid-content">
          <div class="grid-header">
            <div class="grid-pill">${label}</div>
            <div class="grid-counter">${num} / ${total}</div>
          </div>
          <div class="grid-phrase">${posterPhrase}</div>
          <div class="grid-divider"></div>
          <div class="grid-example">${formatExample(phrase)}</div>
          <div class="grid-footer">
            <div class="grid-brand">INTUITY</div>
            <button class="save-btn ${isSaved?'saved':''}" onclick="toggleSave('${phrase.replace(/'/g,"\\'")}',this)">
              ${isSaved?'♥':'♡'}
            </button>
          </div>
        </div>
      </div>
    `;
  }

  return card;
}

function navigatePhrase(dir) {
  const sec = sections[currentSection];
  if (!sec) return;
  const n = currentPhrase + dir;
  if (n < 0 || n >= sec.phrases.length) return;
  currentPhrase = n;
  renderPosterCard();
}

function goToPhrase(i) {
  currentPhrase = i;
  renderPosterCard();
}

// ═══════════════════════════════════════════
//  ESSAY VIEW
// ═══════════════════════════════════════════
function renderEssayView() {
  if (!modelsData?.samples?.length) return;
  const samples = modelsData.samples;
  const sample = samples[essayIndex];

  document.getElementById('essayCounter').textContent = `${essayIndex+1} / ${samples.length}`;
  document.getElementById('prevEssay').disabled = essayIndex === 0;
  document.getElementById('nextEssay').disabled = essayIndex === samples.length - 1;

  const paper = document.getElementById('essayPaper');
  let html = `<div class="essay-title-label">${sample.topic || modelsData.title || ''}</div>`;

  sample.paragraphs.forEach(p => {
    html += `<div class="essay-para">`;
    if (p.label) html += `<div class="essay-para-label">${p.label}</div>`;
    html += `<div class="essay-para-text">${highlightDiscourse(p.text)}</div>`;
    html += `</div>`;
  });

  paper.innerHTML = html;
  document.getElementById('essayScroll').scrollTop = 0;
}

function highlightDiscourse(text) {
  const words = text.trim().split(/\s+/);
  const n = Math.min(4, Math.max(2, Math.floor(words.length * 0.25)));
  return `<span class="dm">${words.slice(0,n).join(' ')}</span> ${words.slice(n).join(' ')}`;
}

function navigateEssay(dir) {
  const n = essayIndex + dir;
  if (!modelsData?.samples || n < 0 || n >= modelsData.samples.length) return;
  essayIndex = n;
  renderEssayView();
}

// ═══════════════════════════════════════════
//  VIEW SWITCHING
// ═══════════════════════════════════════════
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('view-poster').classList.toggle('show', view === 'poster');
  document.getElementById('view-essay').classList.toggle('show', view === 'essay');

  if (view === 'essay') renderEssayView();
  if (view === 'poster') renderPosterView();
}

// ═══════════════════════════════════════════
//  SAVE MECHANIC
// ═══════════════════════════════════════════
function toggleSave(phrase, btn) {
  const idx = savedPhrases.indexOf(phrase);
  if (idx >= 0) {
    savedPhrases.splice(idx, 1);
    btn.classList.remove('saved');
    btn.textContent = '♡';
  } else {
    savedPhrases.push(phrase);
    btn.classList.add('saved');
    btn.textContent = '♥';
  }
  updateSavedUI();
}

function updateSavedUI() {
  document.getElementById('savedCount').textContent = savedPhrases.length;
  const toggleBtn = document.getElementById('saveToggleBtn');
  toggleBtn.classList.toggle('active', savedPhrases.length > 0);
  toggleBtn.textContent = savedPhrases.length > 0 ? '♥' : '♡';

  const list = document.getElementById('savedList');
  list.innerHTML = savedPhrases.map(p =>
    `<div class="saved-tag" title="${p}">${p.substring(0, 40)}${p.length>40?'…':''}</div>`
  ).join('');
}

function toggleSavedTray() {
  savedTrayOpen = !savedTrayOpen;
  document.getElementById('savedTray').classList.toggle('open', savedTrayOpen);
}

// ═══════════════════════════════════════════
//  LOADING
// ═══════════════════════════════════════════
function showLoading(show) {
  document.getElementById('loadingState').classList.toggle('hidden', !show);
}

// ═══════════════════════════════════════════
//  TOUCH SWIPE for poster
// ═══════════════════════════════════════════
let touchStartX = 0;
document.getElementById('posterStage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('posterStage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) navigatePhrase(dx < 0 ? 1 : -1);
}, {passive:true});
</script>
</body>
</html>
